<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#071024">
  <title>NEON BEAT · 横屏音游</title>
  <style>
    :root{--bg:#061022;--panel:rgba(8,18,40,.92);--line:rgba(255,255,255,.14);--text:#f7fbff;--muted:#a6b5d4;--cyan:#49f2ee;--blue:#718cff;--violet:#a878ff;--pink:#ff61b9;--gold:#ffd56a;--safe-l:max(14px,env(safe-area-inset-left));--safe-r:max(14px,env(safe-area-inset-right));--safe-t:max(8px,env(safe-area-inset-top));--safe-b:max(8px,env(safe-area-inset-bottom))}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"PingFang SC",sans-serif}
    button{font:inherit;color:inherit;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .app{position:fixed;inset:0;width:100dvw;height:100dvh;overflow:hidden;background:radial-gradient(circle at 20% 10%,rgba(73,242,238,.12),transparent 34%),radial-gradient(circle at 82% 24%,rgba(255,97,185,.12),transparent 36%),linear-gradient(155deg,#08152d,#050a18)}
    .screen{position:absolute;inset:0;display:none}.screen.active{display:flex}
    .rotate{z-index:50;align-items:center;justify-content:center;text-align:center;padding:28px;background:#050a18}.rotate-card{display:grid;gap:12px;place-items:center}.phone{width:68px;height:112px;border:3px solid var(--cyan);border-radius:14px;animation:turn 1.8s ease-in-out infinite}.rotate h2,.rotate p{margin:0}.rotate p{color:var(--muted)}
    @keyframes turn{0%,25%{transform:rotate(0)}70%,100%{transform:rotate(90deg)}}
    .select{padding:var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);flex-direction:column;gap:10px}
    .top{min-height:42px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:9px}.mark{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--pink));font-weight:800;color:#071024}.brand strong{display:block;letter-spacing:.12em}.brand small{display:block;color:var(--muted);font-size:10px;letter-spacing:.12em}.actions{display:flex;gap:7px}.icon-btn,.soft-btn,.primary-btn{min-height:36px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.055);padding:0 13px}.icon-btn{width:38px;padding:0}.primary-btn{background:linear-gradient(120deg,var(--cyan),#8effcf);color:#071024;font-weight:800;border:0}.soft-btn:active,.icon-btn:active,.primary-btn:active{transform:scale(.97)}
    .songs{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:11px}.song-card{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:22px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;background:var(--panel);isolation:isolate}.song-card::before,.song-card::after{content:"";position:absolute;z-index:-1;pointer-events:none}.song-card::before{inset:0;background:radial-gradient(circle at 74% 25%,rgba(255,255,255,.22),transparent 16%),linear-gradient(135deg,rgba(113,140,255,.34),transparent 52%)}.song-card.sky::before{background:radial-gradient(circle at 70% 15%,rgba(255,255,255,.24),transparent 14%),linear-gradient(135deg,rgba(73,242,238,.32),rgba(113,140,255,.16) 58%,rgba(255,97,185,.12))}.song-card::after{width:220px;height:220px;border-radius:50%;right:-72px;top:-92px;border:1px solid rgba(255,255,255,.18);box-shadow:0 0 0 25px rgba(255,255,255,.025),0 0 0 54px rgba(255,255,255,.018)}.song-card h2{margin:0;font-size:clamp(24px,4.6vw,48px);letter-spacing:-.05em}.song-card .sub{color:#dfe8ff;letter-spacing:.12em}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.pill{padding:5px 8px;border-radius:999px;background:rgba(5,10,25,.58);border:1px solid var(--line);font-size:11px}.song-bottom{display:flex;align-items:end;justify-content:space-between;gap:12px}.song-status{font-size:11px;color:var(--muted);max-width:60%}.song-buttons{display:flex;gap:7px}.missing .primary-btn{opacity:.5}.select-footer{min-height:25px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px}.debug-btn{background:none;color:var(--cyan);padding:4px 8px}
    .game{background:#040812}.game.active{display:block}#gameCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.hud{position:absolute;inset:0;pointer-events:none;padding:var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l)}.hud-row{display:flex;align-items:flex-start;justify-content:space-between}.pause-btn{pointer-events:auto}.score{text-align:right}.score small,.combo small{display:block;color:var(--muted);font-size:9px;letter-spacing:.16em}.score strong{font-size:20px;font-variant-numeric:tabular-nums}.combo{position:absolute;left:50%;top:8%;transform:translateX(-50%);text-align:center}.combo strong{display:block;font-size:clamp(25px,6vw,54px);line-height:1}.judgement{min-height:18px;margin-top:5px;font-size:13px;font-weight:700;letter-spacing:.12em}.progress{position:absolute;left:var(--safe-l);right:var(--safe-r);bottom:var(--safe-b);height:4px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.progress i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink))}
    .overlay{z-index:40;align-items:center;justify-content:center;padding:20px;background:rgba(3,7,18,.82)}.panel{width:min(680px,90vw);max-height:90dvh;overflow:auto;border:1px solid var(--line);border-radius:22px;background:rgba(8,18,40,.96);padding:22px;text-align:center}.panel h2{margin:0 0 10px}.panel p{color:var(--muted)}.menu-actions{display:flex;justify-content:center;flex-wrap:wrap;gap:8px}.tutorial-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.teach{border:1px solid var(--line);border-radius:14px;padding:10px;background:rgba(255,255,255,.04)}.teach b{display:block}.teach small{color:var(--muted)}.note-demo{height:28px;margin:7px auto;width:54px;border-radius:8px;background:var(--cyan);box-shadow:0 0 16px rgba(73,242,238,.35);animation:bob 1.2s ease-in-out infinite}.note-demo.hold{height:55px;width:24px;background:linear-gradient(var(--violet),rgba(168,120,255,.15))}.note-demo.slide{height:8px;width:68px;background:linear-gradient(90deg,var(--cyan),#8effcf);transform:skewX(-25deg)}.note-demo.flick{clip-path:polygon(0 35%,58% 35%,58% 0,100% 50%,58% 100%,58% 65%,0 65%);background:var(--pink)}@keyframes bob{50%{transform:translateY(5px)}}
    .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:12px 0}.stat{padding:9px;border-radius:12px;background:rgba(255,255,255,.045)}.stat small{display:block;color:var(--muted)}.grade{font-size:62px;line-height:1;color:var(--gold);font-weight:800}
    @media(orientation:portrait) and (max-width:700px){.rotate{display:flex!important}}
    @media(max-height:430px){.select{gap:6px}.top{min-height:35px}.songs{gap:8px}.song-card{border-radius:17px;padding:12px}.song-card h2{font-size:clamp(21px,4.4vw,38px)}.meta{margin-top:5px}.song-bottom{align-items:center}.tutorial-grid{margin:7px 0}.teach{padding:6px}.panel{padding:14px}.note-demo{margin:4px auto}}
    @media(max-width:720px){.icon-btn,.soft-btn,.primary-btn{min-height:32px;padding-inline:9px}.songs{grid-template-columns:1fr 1fr}.song-card{padding:10px}.song-status{display:none}.brand small{display:none}}
  </style>
</head>
<body>
<main class="app" id="app">
  <section class="screen rotate" id="rotateScreen"><div class="rotate-card"><div class="phone"></div><h2>请旋转手机进入横屏</h2><p>横屏后自动进入游戏</p></div></section>
  <section class="screen select active" id="selectScreen">
    <header class="top"><div class="brand"><div class="mark">♪</div><div><strong>NEON BEAT</strong><small>LANDSCAPE RHYTHM STAGE</small></div></div><div class="actions"><button class="soft-btn" id="tutorialBtn">音符说明</button><button class="icon-btn" id="vibrationBtn" aria-label="震动">震</button><button class="icon-btn" id="volumeBtn" aria-label="音量">♫</button><button class="icon-btn" id="fullscreenBtn" aria-label="全屏">⛶</button></div></header>
    <div class="songs" id="songList"></div>
    <footer class="select-footer"><button class="debug-btn" id="debugBtn">判定系统节拍器测试</button></footer>
  </section>
  <section class="screen game" id="gameScreen"><canvas id="gameCanvas"></canvas><div class="hud"><div class="hud-row"><button class="icon-btn pause-btn" id="pauseBtn">Ⅱ</button><div class="score"><small>SCORE</small><strong id="scoreValue">0000000</strong></div></div><div class="combo"><small>COMBO</small><strong id="comboValue">0</strong><div class="judgement" id="judgementValue"></div></div><div class="progress"><i id="progressFill"></i></div></div></section>
  <section class="screen overlay" id="tutorialScreen"><div class="panel"><h2>音符说明</h2><div class="tutorial-grid"><div class="teach"><b>Tap</b><div class="note-demo"></div><small>到线时点击</small></div><div class="teach"><b>Hold</b><div class="note-demo hold"></div><small>按住到结束</small></div><div class="teach"><b>Slide</b><div class="note-demo slide"></div><small>沿路径移动</small></div><div class="teach"><b>Flick</b><div class="note-demo flick"></div><small>按箭头甩动</small></div></div><div class="menu-actions"><button class="primary-btn" id="closeTutorialBtn">开始</button></div></div></section>
  <section class="screen overlay" id="pauseScreen"><div class="panel"><h2>PAUSED</h2><div class="menu-actions"><button class="primary-btn" id="resumeBtn">继续</button><button class="soft-btn" id="restartBtn">重新开始</button><button class="soft-btn" id="backBtn">返回选曲</button></div></div></section>
  <section class="screen overlay" id="resultScreen"><div class="panel"><div class="grade" id="gradeValue">S</div><h2 id="resultTitle">春日影 · NORMAL</h2><div class="result-grid" id="resultGrid"></div><div class="menu-actions"><button class="primary-btn" id="retryBtn">再玩一次</button><button class="soft-btn" id="resultBackBtn">返回选曲</button></div></div></section>
</main>
<script>
(()=>{"use strict";
  const $=s=>document.querySelector(s),screens=["selectScreen","gameScreen","tutorialScreen","pauseScreen","resultScreen"];
  const canvas=$("#gameCanvas"),ctx=canvas.getContext("2d",{alpha:false,desynchronized:true}),audio=new Audio(),songList=$("#songList");
  const SONGS=[
    {id:"haruhikage",title:"春日影",subtitle:"HARUHIKAGE",artist:"MyGO!!!!!",difficulty:"NORMAL",theme:"dusk",bpm:0,offset:0,candidates:["./assets/audio/haruhikage.mp3","./assets/audio/haruhikage.m4a","./assets/audio/haruhikage.wav","./assets/audio/haruhikage.ogg"]},
    {id:"hitoshizuku",title:"壱雫空",subtitle:"Hitoshizuku",artist:"MyGO!!!!!",difficulty:"HARD",theme:"sky",bpm:0,offset:0,candidates:["./assets/audio/hitoshizuku.mp3","./assets/audio/hitoshizuku.m4a","./assets/audio/hitoshizuku.wav","./assets/audio/hitoshizuku.ogg"]}
  ];
  const COLORS={tap:"#49f2ee",hold:"#a878ff",slide:"#66ffc5",flick:"#ff78b9",gold:"#ffd56a"};
  const state={screen:"select",song:null,pendingSong:null,debug:false,running:false,paused:false,ended:false,duration:0,time:0,startCtx:0,startOffset:0,audioCtx:null,buffer:null,source:null,gain:null,muted:false,vibration:true,chart:[],activePointers:new Map(),score:0,combo:0,maxCombo:0,stats:{PERFECT:0,GREAT:0,GOOD:0,MISS:0,HOLD_BREAK:0},effects:[],particles:[],lastHud:0,lastFrame:0,raf:0,tutorialSeen:false};
  let W=0,H=0,DPR=1,resizeRaf=0,trackGradient=null,trackTheme="";

  function show(id){screens.forEach(x=>$("#"+x).classList.toggle("active",x===id));state.screen=id.replace("Screen","");}
  function isPhone(){return matchMedia("(pointer:coarse) and (max-width:1000px)").matches}
  function updateOrientation(){const portrait=isPhone()&&innerHeight>innerWidth;$("#rotateScreen").classList.toggle("active",portrait);if(portrait&&state.running&&!state.paused)pauseGame(true);if(!portrait&&state.screen==="select")$("#selectScreen").classList.add("active");scheduleResize()}
  function scheduleResize(){if(resizeRaf)return;resizeRaf=requestAnimationFrame(()=>{resizeRaf=0;resizeCanvas()})}
  function resizeCanvas(){const r=canvas.getBoundingClientRect(),nw=Math.round(r.width),nh=Math.round(r.height),nd=Math.min(devicePixelRatio||1,isPhone()?1.35:2);if(nw===W&&nh===H&&nd===DPR)return;W=nw;H=nh;DPR=nd;canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);trackGradient=null}
  addEventListener("resize",scheduleResize,{passive:true});addEventListener("orientationchange",updateOrientation,{passive:true});if(visualViewport)visualViewport.addEventListener("resize",scheduleResize,{passive:true});new ResizeObserver(scheduleResize).observe(canvas);updateOrientation();

  function formatTime(v){if(!Number.isFinite(v))return "--:--";return Math.floor(v/60)+":"+String(Math.floor(v%60)).padStart(2,"0")}
  function renderSongs(){songList.innerHTML="";SONGS.forEach(song=>{const card=document.createElement("article");card.className="song-card "+(song.theme==="sky"?"sky ":"")+(!song.available?"missing":"");card.innerHTML=`<div><div class="sub">${song.subtitle}</div><h2>${song.title}</h2><div class="meta"><span class="pill">${song.artist}</span><span class="pill">${song.difficulty}</span><span class="pill" data-duration>${formatTime(song.duration)}</span><span class="pill" data-bpm>${song.bpm?song.bpm+" BPM":"BPM 待分析"}</span></div></div><div class="song-bottom"><div class="song-status">${song.available?"音频已就绪":"请将歌曲文件放入 assets/audio 文件夹"}</div><div class="song-buttons"><button class="soft-btn teach-btn">说明</button><button class="primary-btn start-btn">${song.available?"开始":"检查音频"}</button></div></div>`;card.querySelector(".teach-btn").onclick=()=>{state.pendingSong=null;show("tutorialScreen")};card.querySelector(".start-btn").onclick=()=>song.available?requestStart(song):probeSong(song,true);song.el=card;songList.appendChild(card)});}
  function probeCandidate(path){return new Promise(resolve=>{const a=new Audio();let done=false;const end=ok=>{if(done)return;done=true;a.src="";resolve(ok)};a.preload="metadata";a.onloadedmetadata=()=>end({duration:a.duration,path});a.onerror=()=>end(null);a.src=path;setTimeout(()=>end(null),3500)})}
  async function probeSong(song,manual=false){for(const path of song.candidates){const hit=await probeCandidate(path);if(hit){song.available=true;song.audio=hit.path;song.duration=hit.duration;renderSongs();return true}}if(manual)alert("未找到音频。请上传到 assets/audio/，文件名使用 "+song.candidates[0].split("/").pop());return false}
  renderSongs();Promise.all(SONGS.map(s=>probeSong(s))).then(renderSongs);

  async function ensureAudio(){if(!state.audioCtx){state.audioCtx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:"interactive"});state.gain=state.audioCtx.createGain();state.gain.connect(state.audioCtx.destination)}if(state.audioCtx.state==="suspended")await state.audioCtx.resume();state.gain.gain.value=state.muted?0:1}
  async function decodeSong(song){await ensureAudio();if(song.buffer)return song.buffer;const res=await fetch(song.audio);if(!res.ok)throw Error("audio missing");song.buffer=await state.audioCtx.decodeAudioData(await res.arrayBuffer());song.duration=song.buffer.duration;return song.buffer}
  function stopSource(){if(state.source){state.source.onended=null;try{state.source.stop()}catch{}try{state.source.disconnect()}catch{}state.source=null}}
  function playSource(offset){stopSource();if(state.debug){state.startCtx=state.audioCtx.currentTime;state.startOffset=offset;return}const src=state.audioCtx.createBufferSource();src.buffer=state.buffer;src.connect(state.gain);src.onended=()=>{if(state.running&&!state.paused&&!state.ended)finishSong()};src.start(0,Math.max(0,offset));state.source=src;state.startCtx=state.audioCtx.currentTime;state.startOffset=offset}
  function currentTime(){return state.paused?state.startOffset:state.startOffset+(state.audioCtx.currentTime-state.startCtx)}

  function estimateBpm(buffer){const data=buffer.getChannelData(0),rate=buffer.sampleRate,hop=2048,energies=[];for(let i=0;i<data.length;i+=hop){let e=0,end=Math.min(i+hop,data.length);for(let j=i;j<end;j+=4)e+=data[j]*data[j];energies.push(e/Math.max(1,(end-i)/4))}const peaks=[];let avg=.0001,last=-99;for(let i=4;i<energies.length-2;i++){avg=avg*.985+energies[i]*.015;const t=i*hop/rate;if(energies[i]>avg*1.7&&energies[i]>energies[i-1]&&energies[i]>=energies[i+1]&&t-last>.18){peaks.push(t);last=t}}const bins=new Map();for(let i=1;i<peaks.length;i++){let d=peaks[i]-peaks[i-1];while(d<.33)d*=2;while(d>.9)d/=2;const key=Math.round(d*100);bins.set(key,(bins.get(key)||0)+1)}let best=50,count=0;bins.forEach((v,k)=>{if(v>count){count=v;best=k}});let bpm=Math.round(6000/best);while(bpm<80)bpm*=2;while(bpm>190)bpm=Math.round(bpm/2);return Math.max(80,Math.min(190,bpm||120))}
  function addNote(chart,busy,note){const end=note.type==="hold"?note.time+note.duration:note.type==="slide"?note.nodes[note.nodes.length-1].time:note.time;if(note.time<(busy[note.lane]||0)+.08)return false;busy[note.lane]=end;chart.push(note);return true}
  function buildChart(song,duration,bpm){const chart=[],busy=[0,0,0,0,0,0],beat=60/bpm,hard=song.id==="hitoshizuku";let lane=0,index=0;for(let t=2;t<duration-2;t+=beat*(hard?.5:1)){const p=t/duration,section=p<.15?0:p<.48?1:p<.68?2:p<.92?3:4,dense=hard?(section>=2?1:.78):(section===3?.82:.58);if(((index*37)%100)/100>dense){index++;continue}lane=(lane+(hard?(index%2?2:3):1+(index%3===0?1:0)))%6;const accent=index%8===0,typeRoll=index%16;let type="tap";if(section>0&&typeRoll===5)type="hold";if(section>=2&&typeRoll===9)type="slide";if(section>=1&&typeRoll===13)type="flick";if(section===4&&!hard&&typeRoll%3)type="hold";const note={time:t,lane,type,state:"pending",gold:section===3&&accent};if(type==="hold")note.duration=beat*(hard?1.5:2);if(type==="slide")note.nodes=[{time:t+beat*.75,lane:(lane+2)%6},{time:t+beat*1.5,lane:(lane+4)%6}];if(type==="flick")note.direction=["left","right","up"][index%3];addNote(chart,busy,note);if(accent&&section>=2){const other=(lane+3)%6;addNote(chart,busy,{time:t,lane:other,type:"tap",state:"pending",sync:true,gold:section===3})}index++}chart.sort((a,b)=>a.time-b.time);return chart}
  function resetStats(){state.score=0;state.combo=0;state.maxCombo=0;state.stats={PERFECT:0,GREAT:0,GOOD:0,MISS:0,HOLD_BREAK:0};state.effects.length=0;state.particles.length=0;state.activePointers.clear();state.chart.forEach(n=>{n.state="pending";n.pointerId=null;n.nextNode=0;n.lastTick=-1})}
  async function startSong(song){try{await ensureAudio();state.song=song;state.debug=false;state.buffer=await decodeSong(song);song.bpm=song.bpm||estimateBpm(state.buffer);state.duration=state.buffer.duration;state.chart=buildChart(song,state.duration,song.bpm);renderSongs();beginGame()}catch(e){console.error(e);alert("音频加载失败，请检查文件格式与路径")}}
  function requestStart(song){if(!state.tutorialSeen){state.pendingSong=song;show("tutorialScreen")}else startSong(song)}
  async function startDebug(){await ensureAudio();state.song={id:"debug",title:"判定测试",difficulty:"DEBUG",bpm:120};state.debug=true;state.buffer=null;state.duration=180;state.chart=buildChart({id:"hitoshizuku"},state.duration,120);beginGame()}
  function beginGame(){show("gameScreen");resizeCanvas();state.running=true;state.paused=false;state.ended=false;state.startOffset=0;resetStats();playSource(0);if(!state.raf)state.raf=requestAnimationFrame(loop)}
  function pauseGame(auto=false){if(!state.running||state.paused)return;state.startOffset=currentTime();state.paused=true;stopSource();state.activePointers.clear();state.chart.forEach(n=>{if(n.state==="holding"||n.state==="sliding"){n.state="miss";state.stats.MISS++}});show("pauseScreen");if(auto)$("#pauseScreen h2").textContent="已自动暂停"}
  function resumeGame(){if(!state.paused)return;show("gameScreen");state.paused=false;playSource(state.startOffset)}
  function restartGame(){stopSource();state.startOffset=0;state.running=true;state.paused=false;state.ended=false;resetStats();show("gameScreen");playSource(0)}
  function backToSelect(){stopSource();state.running=false;state.paused=false;state.ended=false;state.activePointers.clear();show("selectScreen")}

  function laneAt(x,y){const judgeY=H*.86,farY=H*.12,t=Math.max(0,Math.min(1,(y-farY)/(judgeY-farY))),farW=W*.28,nearW=W*.72,width=farW+(nearW-farW)*t,left=(W-width)/2;return Math.max(0,Math.min(5,Math.floor((x-left)/(width/6))))}
  function timingGrade(diff){const a=Math.abs(diff);return a<=.045?"PERFECT":a<=.09?"GREAT":a<=.14?"GOOD":null}
  function findNote(lane,time,types){let best=null,bd=.141;for(const n of state.chart){if(n.state!=="pending"||n.lane!==lane||!types.includes(n.type))continue;const d=Math.abs(n.time-time);if(d<bd){bd=d;best=n}}return best}
  function judge(note,grade,x,y,partial=false){if(!grade)return;const mult={PERFECT:1000,GREAT:800,GOOD:500}[grade];state.score+=partial?Math.round(mult*.35):mult;state.stats[grade]++;if(grade==="GOOD")state.combo=0;else state.combo++;state.maxCombo=Math.max(state.maxCombo,state.combo);state.effects.push({x,y,life:1,color:grade==="PERFECT"?COLORS.gold:grade==="GREAT"?COLORS.tap:COLORS.hold});if(state.effects.length>18)state.effects.shift();if(state.vibration&&grade==="PERFECT"&&navigator.vibrate)navigator.vibrate(8);showJudge(grade)}
  function miss(note,label="MISS"){if(note.state==="miss"||note.state==="done")return;note.state="miss";state.stats.MISS++;state.combo=0;showJudge(label)}
  function showJudge(text){$("#judgementValue").textContent=text;$("#judgementValue").animate([{opacity:0,transform:"scale(.85)"},{opacity:1,transform:"scale(1)"},{opacity:0}],{duration:500})}
  function pointerDown(e){if(!state.running||state.paused)return;e.preventDefault();canvas.setPointerCapture(e.pointerId);const rect=canvas.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top,lane=laneAt(x,y),time=currentTime(),p={pointerId:e.pointerId,startX:x,startY:y,currentX:x,currentY:y,startTime:performance.now(),startLane:lane,currentLane:lane,activeHold:null,activeSlide:null,flickCandidate:null};state.activePointers.set(e.pointerId,p);let n=findNote(lane,time,["hold","slide","tap"]);if(n){const g=timingGrade(time-n.time);if(n.type==="tap"){n.state="done";judge(n,g,x,y)}else if(n.type==="hold"){n.state="holding";n.pointerId=e.pointerId;n.lastTick=0;p.activeHold=n;judge(n,g,x,y,true)}else{n.state="sliding";n.pointerId=e.pointerId;n.nextNode=0;p.activeSlide=n;judge(n,g,x,y,true)}}else{n=findNote(lane,time,["flick"]);if(n)p.flickCandidate=n}}
  function flickDirection(dx,dy){if(Math.abs(dy)>Math.abs(dx)&&dy<0)return "up";return dx<0?"left":"right"}
  function pointerMove(e){const p=state.activePointers.get(e.pointerId);if(!p)return;e.preventDefault();const r=canvas.getBoundingClientRect();p.currentX=e.clientX-r.left;p.currentY=e.clientY-r.top;p.currentLane=laneAt(p.currentX,p.currentY);const time=currentTime();if(p.activeSlide){const n=p.activeSlide,node=n.nodes[n.nextNode];if(node&&Math.abs(time-node.time)<=.22&&Math.abs(p.currentLane-node.lane)<=0){n.nextNode++;judge(n,"PERFECT",p.currentX,p.currentY,true);if(n.nextNode>=n.nodes.length){n.state="done";p.activeSlide=null}}}if(!p.flickCandidate)p.flickCandidate=findNote(p.currentLane,time,["flick"])}
  function pointerEnd(e,cancel=false){const p=state.activePointers.get(e.pointerId);if(!p)return;const now=performance.now(),dx=p.currentX-p.startX,dy=p.currentY-p.startY,dist=Math.hypot(dx,dy),speed=dist/Math.max(1,now-p.startTime),time=currentTime();if(p.activeHold){const n=p.activeHold,end=n.time+n.duration;if(!cancel&&time>=end-.14){n.state="done";judge(n,timingGrade(time-end)||"GOOD",p.currentX,p.currentY,true)}else{state.stats.HOLD_BREAK++;miss(n,"HOLD BREAK")}}if(p.activeSlide){miss(p.activeSlide,"SLIDE BREAK")}if(p.flickCandidate&&!cancel){const n=p.flickCandidate,dir=flickDirection(dx,dy),grade=timingGrade(time-n.time);if(dist>=34&&speed>=.28&&dir===n.direction&&grade){n.state="done";judge(n,grade,p.currentX,p.currentY)}else if(Math.abs(time-n.time)<.18&&dist>15){miss(n)}}state.activePointers.delete(e.pointerId)}
  canvas.addEventListener("pointerdown",pointerDown);canvas.addEventListener("pointermove",pointerMove);canvas.addEventListener("pointerup",e=>pointerEnd(e));canvas.addEventListener("pointercancel",e=>pointerEnd(e,true));

  function laneGeometry(progress,lane){const farY=H*.12,judgeY=H*.86,farW=W*.28,nearW=W*.72,width=farW+(nearW-farW)*progress,left=(W-width)/2;return{x:left+(lane+.5)*(width/6),y:farY+(judgeY-farY)*progress,w:width/6}}
  function noteProgress(note,time){return 1-(note.time-time)/1.8}
  function drawTrack(theme){ctx.fillStyle=theme==="sky"?"#061325":"#080b20";ctx.fillRect(0,0,W,H);if(!trackGradient||trackTheme!==theme){trackTheme=theme;trackGradient=ctx.createLinearGradient(0,0,0,H);trackGradient.addColorStop(0,theme==="sky"?"#153e67":"#272456");trackGradient.addColorStop(1,"#040711")}ctx.fillStyle=trackGradient;ctx.fillRect(0,0,W,H);const fy=H*.12,jy=H*.86,fw=W*.28,nw=W*.72;ctx.beginPath();ctx.moveTo((W-fw)/2,fy);ctx.lineTo((W+fw)/2,fy);ctx.lineTo((W+nw)/2,jy);ctx.lineTo((W-nw)/2,jy);ctx.closePath();ctx.fillStyle="rgba(6,12,30,.72)";ctx.fill();ctx.strokeStyle="rgba(255,255,255,.16)";ctx.lineWidth=1;for(let i=0;i<=6;i++){ctx.beginPath();ctx.moveTo((W-fw)/2+fw*i/6,fy);ctx.lineTo((W-nw)/2+nw*i/6,jy);ctx.stroke()}for(const p of state.activePointers.values()){const lane=p.currentLane,x1=(W-nw)/2+nw*lane/6;ctx.fillStyle="rgba(73,242,238,.12)";ctx.fillRect(x1,jy-24,nw/6,24)}ctx.strokeStyle=COLORS.tap;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo((W-nw)/2,jy);ctx.lineTo((W+nw)/2,jy);ctx.stroke()}
  function drawNote(n,time){const p=noteProgress(n,time);if(p<-.05||p>1.16||n.state==="done"||n.state==="miss")return;const geo=laneGeometry(Math.max(0,Math.min(1.1,p)),n.lane),alpha=Math.max(.15,Math.min(1,p+.15)),color=n.gold?COLORS.gold:COLORS[n.type];ctx.save();ctx.globalAlpha=alpha;if(n.type==="hold"){const endP=1-((n.time+n.duration)-time)/1.8,end=laneGeometry(Math.max(0,Math.min(1.1,endP)),n.lane);ctx.strokeStyle=color;ctx.lineWidth=Math.max(8,geo.w*.48);ctx.lineCap="round";ctx.globalAlpha=alpha*.45;ctx.beginPath();ctx.moveTo(end.x,end.y);ctx.lineTo(geo.x,geo.y);ctx.stroke();ctx.globalAlpha=alpha}if(n.type==="slide"){ctx.strokeStyle=color;ctx.lineWidth=Math.max(5,geo.w*.18);ctx.lineCap="round";ctx.beginPath();ctx.moveTo(geo.x,geo.y);for(const node of n.nodes){const np=1-(node.time-time)/1.8,ng=laneGeometry(Math.max(0,Math.min(1.1,np)),node.lane);ctx.lineTo(ng.x,ng.y)}ctx.stroke()}const w=Math.max(16,geo.w*.72),h=Math.max(8,w*.18);ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=isPhone()?4:8;if(n.type==="flick"){ctx.translate(geo.x,geo.y);const dir=n.direction,rot=dir==="left"?Math.PI:dir==="up"?-Math.PI/2:0;ctx.rotate(rot);ctx.beginPath();ctx.moveTo(-w*.5,-h);ctx.lineTo(w*.15,-h);ctx.lineTo(w*.15,-h*2);ctx.lineTo(w*.55,0);ctx.lineTo(w*.15,h*2);ctx.lineTo(w*.15,h);ctx.lineTo(-w*.5,h);ctx.closePath();ctx.fill()}else{ctx.fillRect(geo.x-w/2,geo.y-h/2,w,h);if(n.sync){ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(geo.x-w/2-2,geo.y-h/2-2,w+4,h+4)}}ctx.restore()}
  function drawEffects(delta){for(let i=state.effects.length-1;i>=0;i--){const e=state.effects[i];e.life-=delta/420;ctx.save();ctx.globalAlpha=Math.max(0,e.life);ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(e.x,e.y,(1-e.life)*48+8,0,Math.PI*2);ctx.stroke();ctx.restore();if(e.life<=0)state.effects.splice(i,1)}}
  function updateLogic(time){for(const n of state.chart){if(n.state==="pending"&&time>n.time+.14)miss(n);if(n.state==="holding"){const p=state.activePointers.get(n.pointerId);if(!p){miss(n,"HOLD BREAK");continue}const elapsed=time-n.time,tick=Math.floor(elapsed/(60/state.song.bpm));if(tick>n.lastTick&&time<n.time+n.duration){n.lastTick=tick;state.score+=100;state.combo++;state.maxCombo=Math.max(state.maxCombo,state.combo)}if(time>=n.time+n.duration){n.state="done";p.activeHold=null;judge(n,"PERFECT",p.currentX,p.currentY,true)}}if(n.state==="sliding"&&time>(n.nodes[n.nextNode]?.time||n.time)+.25)miss(n,"SLIDE BREAK")}}
  function updateHud(now){if(now-state.lastHud<50)return;state.lastHud=now;$("#scoreValue").textContent=String(state.score).padStart(7,"0");$("#comboValue").textContent=state.combo;$("#progressFill").style.width=Math.min(100,state.time/state.duration*100)+"%"}
  function loop(now){state.raf=requestAnimationFrame(loop);if(!state.running||state.paused||state.screen!=="game")return;const delta=Math.min(40,state.lastFrame?now-state.lastFrame:16.7);if(delta<1000/60*.85)return;state.lastFrame=now;state.time=currentTime()+(state.song.offset||0)/1000;updateLogic(state.time);drawTrack(state.song.theme);for(let i=state.chart.length-1;i>=0;i--)drawNote(state.chart[i],state.time);drawEffects(delta);updateHud(now);if(state.time>=state.duration&&!state.ended)finishSong()}
  function finishSong(){if(state.ended)return;state.ended=true;state.running=false;stopSource();const hit=state.stats.PERFECT+state.stats.GREAT+state.stats.GOOD,total=hit+state.stats.MISS,accuracy=total?((state.stats.PERFECT+state.stats.GREAT*.8+state.stats.GOOD*.5)/total*100):0,grade=accuracy>=95?"S":accuracy>=85?"A":accuracy>=70?"B":"C";$("#gradeValue").textContent=grade;$("#resultTitle").textContent=state.song.title+" · "+state.song.difficulty;$("#resultGrid").innerHTML=`<div class="stat"><small>SCORE</small>${state.score}</div><div class="stat"><small>MAX COMBO</small>${state.maxCombo}</div><div class="stat"><small>ACCURACY</small>${accuracy.toFixed(2)}%</div><div class="stat"><small>PERFECT</small>${state.stats.PERFECT}</div><div class="stat"><small>GREAT / GOOD</small>${state.stats.GREAT} / ${state.stats.GOOD}</div><div class="stat"><small>MISS / HOLD BREAK</small>${state.stats.MISS} / ${state.stats.HOLD_BREAK}</div>`;show("resultScreen")}

  $("#tutorialBtn").onclick=()=>{state.pendingSong=null;show("tutorialScreen")};$("#closeTutorialBtn").onclick=()=>{state.tutorialSeen=true;const song=state.pendingSong;state.pendingSong=null;song?startSong(song):show("selectScreen")};$("#pauseBtn").onclick=()=>pauseGame();$("#resumeBtn").onclick=resumeGame;$("#restartBtn").onclick=restartGame;$("#backBtn").onclick=backToSelect;$("#retryBtn").onclick=restartGame;$("#resultBackBtn").onclick=backToSelect;$("#debugBtn").onclick=startDebug;
  $("#volumeBtn").onclick=()=>{state.muted=!state.muted;if(state.gain)state.gain.gain.value=state.muted?0:1;$("#volumeBtn").textContent=state.muted?"♩":"♫"};$("#vibrationBtn").onclick=()=>{state.vibration=!state.vibration;$("#vibrationBtn").style.opacity=state.vibration?1:.45};$("#fullscreenBtn").onclick=async()=>{try{await document.documentElement.requestFullscreen?.()}catch{}};
  document.addEventListener("visibilitychange",()=>{if(document.hidden&&state.running&&!state.paused)pauseGame(true)});document.addEventListener("contextmenu",e=>e.preventDefault());
})();
</script>
</body>
